<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Drive URL Cleaner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>🔗 Google Drive Link Cleaner</h2>
    <p>Dán link Google Drive để tự động mở tab mới</p>
    
    <button id="pasteBtn" class="paste-btn">📋 Dán từ Clipboard</button>
    
    <textarea id="urlInput" placeholder="Hoặc dán link vào đây..."></textarea>
    
    <div id="status" class="status hidden"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
