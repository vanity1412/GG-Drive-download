<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Drive Link Cleaner</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 920px;
      margin: 40px auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }
    p {
      margin: 0 0 18px 0;
      color: #4b5563;
      line-height: 1.5;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      line-height: 1.5;
      outline: none;
    }
    textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.12);
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
      margin-bottom: 18px;
    }
    button, a.button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary {
      background: #4f46e5;
      color: white;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .output {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }
    .label {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }
    .result-box {
      width: 100%;
      min-height: 90px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, monospace;
      font-size: 14px;
      color: #111827;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 12px;
    }
    .status {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    .ok { color: #047857; }
    .err { color: #b91c1c; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Google Drive Link Cleaner</h1>
      <p>Dán link Google Drive vào ô bên dưới. Hệ thống sẽ tự động xử lý và hiện kết quả ngay phía dưới.</p>

      <textarea id="inputUrl" placeholder="Dán link Google Drive vào đây..."></textarea>

      <div class="row">
        <button id="pasteBtn" class="primary">Dán từ clipboard</button>
        <button id="copyBtn" class="secondary">Copy kết quả</button>
        <button id="clearBtn" class="secondary">Xóa</button>
        <a id="openBtn" class="button primary" href="#" target="_blank" rel="noopener noreferrer" style="pointer-events:none;opacity:.5;">Mở link sạch</a>
      </div>

      <div class="output">
        <div class="label">Kết quả</div>
        <div id="result" class="result-box">Chưa có dữ liệu.</div>
        <div id="status" class="status"></div>
      </div>
    </div>
  </div>

  <script>
    const inputUrl = document.getElementById('inputUrl');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    const pasteBtn = document.getElementById('pasteBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const openBtn = document.getElementById('openBtn');

    function setStatus(message, type = '') {
      status.textContent = message;
      status.className = 'status ' + type;
    }

    function cleanDriveUrl(url) {
      let cleaned = url.trim();
      if (!cleaned) return '';

      let parsed;
      try {
        parsed = new URL(cleaned);
      } catch {
        throw new Error('Link không hợp lệ.');
      }

      if (!parsed.hostname.includes('drive.google.com')) {
        throw new Error('Đây không phải link Google Drive.');
      }

      // Xóa range=...
      cleaned = cleaned.replace(/([?&])range=[^&]*&/g, '$1');
      cleaned = cleaned.replace(/([?&])range=[^&]*$/g, '');

      // Chỉ xóa "=1&srfvp=1" sau "ump", giữ lại "&ump"
      cleaned = cleaned.replace(/([?&]ump)=1&srfvp=1(?=&|$)/g, '$1');

      // Nếu còn srfvp đứng riêng lẻ thì xóa
      cleaned = cleaned.replace(/([?&])srfvp=[^&]*&/g, '$1');
      cleaned = cleaned.replace(/([?&])srfvp=[^&]*$/g, '');

      // Dọn ký tự thừa
      cleaned = cleaned.replace(/\?&/g, '?');
      cleaned = cleaned.replace(/&&+/g, '&');
      cleaned = cleaned.replace(/[?&]$/g, '');

      return cleaned;
    }

    function updateOutput() {
      const value = inputUrl.value.trim();

      if (!value) {
        result.textContent = 'Chưa có dữ liệu.';
        setStatus('', '');
        openBtn.href = '#';
        openBtn.style.pointerEvents = 'none';
        openBtn.style.opacity = '.5';
        return;
      }

      try {
        const cleaned = cleanDriveUrl(value);
        result.textContent = cleaned;
        setStatus('Đã xử lý link thành công.', 'ok');
        openBtn.href = cleaned;
        openBtn.style.pointerEvents = 'auto';
        openBtn.style.opacity = '1';
      } catch (err) {
        result.textContent = 'Không thể xử lý.';
        setStatus(err.message, 'err');
        openBtn.href = '#';
        openBtn.style.pointerEvents = 'none';
        openBtn.style.opacity = '.5';
      }
    }

    inputUrl.addEventListener('input', updateOutput);

    inputUrl.addEventListener('paste', () => {
      setTimeout(updateOutput, 20);
    });

    pasteBtn.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        inputUrl.value = text;
        updateOutput();
      } catch (err) {
        setStatus('Trình duyệt chặn đọc clipboard. Hãy Ctrl+V trực tiếp vào ô nhập.', 'err');
        inputUrl.focus();
      }
    });

    copyBtn.addEventListener('click', async () => {
      const text = result.textContent;
      if (!text || text === 'Chưa có dữ liệu.' || text === 'Không thể xử lý.') {
        setStatus('Chưa có kết quả để copy.', 'err');
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        setStatus('Đã copy kết quả.', 'ok');
      } catch (err) {
        setStatus('Không thể copy tự động. Hãy bôi đen và copy thủ công.', 'err');
      }
    });

    clearBtn.addEventListener('click', () => {
      inputUrl.value = '';
      updateOutput();
      inputUrl.focus();
    });

    updateOutput();
  </script>
</body>
</html>
